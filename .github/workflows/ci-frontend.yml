name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'beanbalance-front/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'beanbalance-front/**'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: beanbalance-front/package-lock.json

      - name: Install dependencies
        working-directory: beanbalance-front
        run: npm ci

      - name: Build (also validates TypeScript)
        working-directory: beanbalance-front
        run: npm run build

  build-push:
    name: Build & Push Docker image
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: beanbalance-front
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/beanbalance-frontend:latest
            ghcr.io/${{ github.repository_owner }}/beanbalance-frontend:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/beanbalance
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
