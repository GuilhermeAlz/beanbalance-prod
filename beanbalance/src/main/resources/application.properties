spring.application.name=beanbalance

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/beanbalance
spring.datasource.username=beanbalance
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
# Legacy block kept intentionally empty — this app validates externally-issued JWTs only

# External JWT validation (AuthMicroservice)
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:SuaChaveSecretaSuperSeguraComMaisDe32Caracteres!@#2024}
app.security.jwt.issuer=${APP_SECURITY_JWT_ISSUER:AuthMicroservice}
app.security.jwt.audience=${APP_SECURITY_JWT_AUDIENCE:SpringBootApp}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
