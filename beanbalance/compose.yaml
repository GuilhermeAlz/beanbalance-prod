services:
  postgres:
    image: 'postgres:17'
    environment:
      - 'POSTGRES_DB=beanbalance'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=beanbalance'
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beanbalance -d beanbalance"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/beanbalance'
      - 'SPRING_DATASOURCE_USERNAME=beanbalance'
      - 'SPRING_DATASOURCE_PASSWORD=secret'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
